<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キタカン大送別会</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e0f7fa 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* 背景に浮かぶ絵文字 */
  .floating-emoji {
    position: fixed;
    font-size: 1.6rem;
    opacity: 0.18;
    pointer-events: none;
    animation: floatUp linear infinite;
    z-index: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.18; }
    90%  { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    max-width: 520px;
    width: 100%;
    padding: 40px 32px;
    animation: fadeInUp 0.6s ease-out;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.8); }
    60%  { transform: scale(1.05); }
    100% { opacity: 1; transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @keyframes emojiPop {
    0%   { transform: translate(-50%, 0) scale(0); opacity: 1; }
    50%  { transform: translate(-50%, -40px) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -70px) scale(0.8); opacity: 0; }
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    color: #37474f;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.82rem;
    color: #90a4ae;
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .form-group {
    margin-bottom: 28px;
  }

  .form-group.shake {
    animation: shake 0.4s ease-out;
  }

  label.question {
    display: block;
    font-weight: 700;
    color: #455a64;
    margin-bottom: 10px;
    font-size: 0.95rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 1rem;
    transition: border-color 0.3s, box-shadow 0.3s;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: #7986cb;
    box-shadow: 0 0 0 3px rgba(121,134,203,0.2);
  }

  .radio-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .radio-option {
    position: relative;
  }

  .radio-option input[type="radio"] {
    display: none;
  }

  .radio-option label {
    display: block;
    padding: 14px 18px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 0.93rem;
    color: #546e7a;
    user-select: none;
    position: relative;
    overflow: visible;
  }

  .radio-option label:hover {
    border-color: #7986cb;
    background: #f5f5ff;
    transform: translateX(4px);
  }

  .radio-option input[type="radio"]:checked + label {
    border-color: #7986cb;
    background: #e8eaf6;
    color: #283593;
    font-weight: 600;
  }

  /* 選択時に飛び出す絵文字 */
  .emoji-burst {
    position: absolute;
    font-size: 1.5rem;
    pointer-events: none;
    animation: emojiPop 0.8s ease-out forwards;
    z-index: 10;
  }

  .reaction {
    margin-top: 8px;
    padding: 10px 14px;
    background: #fff8e1;
    border-radius: 10px;
    font-size: 0.85rem;
    color: #6d4c41;
    animation: popIn 0.4s ease-out;
    display: none;
    border-left: 3px solid #ffca28;
  }

  .reaction.visible {
    display: block;
  }

  .submit-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #7986cb, #5c6bc0);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(92,107,192,0.4);
    background: linear-gradient(135deg, #5c6bc0, #3f51b5);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    background: #bdbdbd;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .result-screen {
    display: none;
    text-align: center;
  }

  .result-screen h2 {
    font-size: 1.4rem;
    color: #37474f;
    margin-bottom: 10px;
  }

  .result-screen p {
    color: #78909c;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .result-message {
    margin-top: 16px;
    padding: 14px;
    background: #f1f8e9;
    border-radius: 12px;
    font-size: 0.88rem;
    color: #558b2f;
    border-left: 3px solid #8bc34a;
    animation: popIn 0.5s ease-out 0.3s both;
  }

  .countdown-box {
    margin-top: 20px;
    padding: 18px;
    background: linear-gradient(135deg, #fce4ec, #f3e5f5);
    border-radius: 14px;
    animation: popIn 0.5s ease-out 0.5s both;
  }

  .countdown-box .label {
    font-size: 0.8rem;
    color: #ad1457;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .countdown-box .days {
    font-size: 2.2rem;
    font-weight: 800;
    color: #c2185b;
  }

  .countdown-box .days-label {
    font-size: 0.85rem;
    color: #ad1457;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .error-msg {
    color: #e53935;
    font-size: 0.82rem;
    margin-top: 6px;
    display: none;
  }

  .sending-msg {
    text-align: center;
    color: #7986cb;
    font-size: 0.9rem;
    margin-top: 12px;
    display: none;
  }

  .sending-msg .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  .error-screen {
    display: none;
    text-align: center;
  }

  .error-screen h2 {
    font-size: 1.3rem;
    color: #e53935;
    margin-bottom: 10px;
  }

  .error-screen p {
    color: #78909c;
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .retry-btn {
    display: inline-block;
    padding: 12px 28px;
    background: linear-gradient(135deg, #7986cb, #5c6bc0);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .retry-btn:hover {
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="card">
  <!-- フォーム画面 -->
  <div id="formScreen">
    <h1>キタカン大送別会</h1>
    <p class="subtitle">異動される皆さん(ステイの皆さん)のますますのご活躍を祈念して飲みましょう。<br>多分高崎開催、夜のイメージです！来れる人多い方でやります by 柴田・遠藤</p>

    <form id="rsvpForm" onsubmit="return false;">
      <!-- Q1 氏名 -->
      <div class="form-group" id="nameGroup">
        <label class="question">Q1. 氏名を記載してください</label>
        <input type="text" id="nameInput" placeholder="例：山田 太郎" autocomplete="off">
        <p class="error-msg" id="nameError">※ 氏名の入力をお願いします！</p>
      </div>

      <!-- Q2 参加日程 -->
      <div class="form-group" id="scheduleGroup">
        <label class="question">Q2. あなたのスケジュールを教えてください</label>
        <div class="radio-group">

          <div class="radio-option">
            <input type="radio" name="schedule" id="opt1" value="3/20（金）参加可能"
                   data-reaction="金曜の夜、最高のスタートですね！"
                   data-emoji="🍻">
            <label for="opt1">3/20（金）参加可能</label>
          </div>

          <div class="radio-option">
            <input type="radio" name="schedule" id="opt2" value="3/28（土）参加可能"
                   data-reaction="土曜なら心置きなく飲めますね！"
                   data-emoji="🎉">
            <label for="opt2">3/28（土）参加可能</label>
          </div>

          <div class="radio-option">
            <input type="radio" name="schedule" id="opt3" value="両日OK"
                   data-reaction="幹事が泣いて喜びます。感謝の極み…！"
                   data-emoji="🙌">
            <label for="opt3">両日OK</label>
          </div>

          <div class="radio-option">
            <input type="radio" name="schedule" id="opt4" value="両日NG"
                   data-reaction="幹事は静かに泣いています…。心だけでも参加ですね。"
                   data-emoji="😢">
            <label for="opt4">両日NG</label>
          </div>

        </div>
        <div class="reaction" id="reactionBox"></div>
        <p class="error-msg" id="scheduleError">※ 日程を選んでください！</p>
      </div>

      <button type="button" class="submit-btn" id="submitBtn" onclick="submitForm()">
        送信（幹事へ念を送る）
      </button>
      <p class="sending-msg" id="sendingMsg">念を転送しています<span class="dots"></span></p>
    </form>
  </div>

  <!-- 送信完了画面 -->
  <div class="result-screen" id="resultScreen">
    <h2>回答ありがとう！</h2>
    <p>あなたの念は無事に幹事へ届きました。<br>幹事が全力で集計します。</p>

    <div class="result-message" id="funMessage"></div>

    <div class="countdown-box">
      <div class="label">送別会カウントダウン</div>
      <div class="days" id="countdownDays">--</div>
      <div class="days-label">日後に送別会！</div>
    </div>
  </div>

  <!-- エラー画面 -->
  <div class="error-screen" id="errorScreen">
    <h2>送信に失敗しました…</h2>
    <p>念の転送に失敗したようです。<br>電波の良い場所でもう一度お試しください。</p>
    <button class="retry-btn" onclick="retryForm()">もう一度送信する</button>
  </div>
</div>

<!-- 紙吹雪コンテナ -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzynYAiwPTTrL1Se13fCGyhglJ7nNvz1_ZX1oQBSG1iUDV2DRUUS3S4X2WZv7yo8Dmv/exec';

  // ========== 背景の浮遊絵文字 ==========
  (function createFloatingEmojis() {
    const emojis = ['🍺','🎊','🥂','🎶','✨','🍻','🎈','🥳'];
    for (let i = 0; i < 12; i++) {
      const el = document.createElement('div');
      el.className = 'floating-emoji';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (Math.random() * 10 + 12) + 's';
      el.style.animationDelay = (Math.random() * 10) + 's';
      el.style.fontSize = (Math.random() * 1 + 1.2) + 'rem';
      document.body.appendChild(el);
    }
  })();

  // ========== 選択時の絵文字バースト ==========
  function burstEmoji(label, emoji) {
    const rect = label.getBoundingClientRect();
    const el = document.createElement('span');
    el.className = 'emoji-burst';
    el.textContent = emoji;
    el.style.left = (rect.width / 2) + 'px';
    el.style.top = '0px';
    label.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  // ========== ラジオボタン選択時 ==========
  document.querySelectorAll('input[name="schedule"]').forEach(radio => {
    radio.addEventListener('change', function() {
      const box = document.getElementById('reactionBox');
      box.textContent = this.dataset.reaction;
      box.classList.add('visible');
      box.style.animation = 'none';
      box.offsetHeight;
      box.style.animation = 'popIn 0.4s ease-out';

      // 絵文字バースト
      const label = this.nextElementSibling;
      burstEmoji(label, this.dataset.emoji);
    });
  });

  // ========== 送信ボタンホバーで文言チェンジ ==========
  const btnTexts = [
    '送信（幹事へ念を送る）',
    '送信（祈りを込めて）',
    '送信（ポチッとな）',
    '送信（覚悟はいいか）',
    '送信（幹事が待ってる）'
  ];
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.addEventListener('mouseenter', function() {
    if (!this.disabled) {
      this.textContent = btnTexts[Math.floor(Math.random() * btnTexts.length)];
    }
  });

  // ========== バリデーション（震えるエラー） ==========
  function submitForm() {
    const name = document.getElementById('nameInput').value.trim();
    const schedule = document.querySelector('input[name="schedule"]:checked');
    const nameError = document.getElementById('nameError');
    const scheduleError = document.getElementById('scheduleError');
    let valid = true;

    if (!name) {
      valid = false;
      nameError.style.display = 'block';
      const g = document.getElementById('nameGroup');
      g.classList.remove('shake');
      void g.offsetHeight;
      g.classList.add('shake');
    } else {
      nameError.style.display = 'none';
    }

    if (!schedule) {
      valid = false;
      scheduleError.style.display = 'block';
      const g = document.getElementById('scheduleGroup');
      g.classList.remove('shake');
      void g.offsetHeight;
      g.classList.add('shake');
    } else {
      scheduleError.style.display = 'none';
    }

    if (!valid) return;

    // ボタン無効化 & 送信中表示
    submitBtn.disabled = true;
    submitBtn.textContent = '送信中...';
    document.getElementById('sendingMsg').style.display = 'block';

    const data = {
      name: name,
      schedule: schedule.value,
      timestamp: new Date().toLocaleString('ja-JP')
    };

    fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    })
    .then(() => {
      showResult(schedule.value);
    })
    .catch(() => {
      showError();
    });
  }

  // ========== 送信完了（ランダムメッセージ） ==========
  function showResult(scheduleValue) {
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('resultScreen').style.display = 'block';
    document.getElementById('resultScreen').style.animation = 'fadeInUp 0.5s ease-out';

    // 選択に応じたメッセージ
    const msgs = {
      '3/20（金）参加可能': [
        '金曜の夜が最高の夜になる予感…！準備運動しておいてください。',
        '花金に乾杯する準備はできましたか？肝臓の準備もお忘れなく。'
      ],
      '3/28（土）参加可能': [
        '土曜の宴、朝まで語り明かしましょう（翌日の予定は白紙推奨）。',
        '土曜なので翌日を気にせず飲める…これは危険なフラグです。'
      ],
      '両日OK': [
        'あなたの参加率100%、幹事の信頼度も100%です。',
        '両日参加とは…送別会への愛が深すぎます。表彰ものです。'
      ],
      '両日NG': [
        '残念ですが、心の中であなたの席は空けておきます。',
        '来られなくても大丈夫。写真と思い出はしっかり届けます。'
      ]
    };
    const list = msgs[scheduleValue] || ['回答ありがとうございます！'];
    document.getElementById('funMessage').textContent = list[Math.floor(Math.random() * list.length)];

    // カウントダウン（3/20基準）
    const now = new Date();
    const target = new Date(now.getFullYear(), 2, 20);
    if (target < now) target.setFullYear(target.getFullYear() + 1);
    const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
    document.getElementById('countdownDays').textContent = diff;

    launchConfetti();
  }

  function showError() {
    document.getElementById('formScreen').style.display = 'none';
    document.getElementById('errorScreen').style.display = 'block';
    document.getElementById('errorScreen').style.animation = 'fadeInUp 0.5s ease-out';
  }

  function retryForm() {
    document.getElementById('errorScreen').style.display = 'none';
    document.getElementById('formScreen').style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = '送信（幹事へ念を送る）';
    document.getElementById('sendingMsg').style.display = 'none';
  }

  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#e91e63','#ff9800','#4caf50','#2196f3','#9c27b0','#ffeb3b','#00bcd4'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + '%';
      piece.style.top = '-10px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 8 + 6) + 'px';
      piece.style.height = (Math.random() * 8 + 6) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
      piece.style.animationDelay = (Math.random() * 1.5) + 's';
      container.appendChild(piece);
    }
    setTimeout(() => { container.innerHTML = ''; }, 5000);
  }
</script>

</body>
</html>
